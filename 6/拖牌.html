<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>539 拖牌分析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Consolas", "微軟正黑體"; }
        body { background: #000; width: 1202px; margin: 0 auto; padding-top: 5px; }
        .nav-bar { width: 1202px; display: flex; gap: 1px; margin-bottom: 2px; }
        .nav-tab { flex: 1; padding: 10px 0; background: #333; color: #ccc; font-size: 12px; text-align: center; text-decoration: none; border: 1px solid #444; font-weight: bold; }
        .nav-tab.active { background: #ff9900 !important; color: #000 !important; }
        .viewport { width: 1202px; min-height: 442px; background: #fff; border: 1px solid #fff; display: flex; flex-direction: column; }
        .info-head { background: #eee; padding: 10px; font-weight: bold; border-bottom: 2px solid #000; }
        .res-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; }
        .res-card { border: 1px solid #ccc; padding: 10px; background: #fafafa; text-align: center; }
        .ball { display: inline-block; width: 30px; height: 30px; background: #8B0000; color: #fff; border-radius: 50%; line-height: 30px; font-weight: bold; }
    </style>
    <script src="https://88ll88.github.io/888/aaa.js"></script>
</head>
<body>
    <div class="nav-bar">
        <a href="分佈圖.html" class="nav-tab">分佈圖</a>
        <a href="柱狀圖.html" class="nav-tab">柱狀圖</a>
        <a href="三分區.html" class="nav-tab">三分區</a>
        <a href="拖牌.html" class="nav-tab active">拖牌</a>
        <a href="遺漏.html" class="nav-tab">遺漏</a>
        <a href="統計表.html" class="nav-tab">統計表</a>
    </div>
    <div class="viewport">
        <div class="info-head" id="last-info">最新一期：加載中...</div>
        <div class="res-grid" id="drag-res"></div>
    </div>
    <script>
        window.onload = function() {
            let last = aaa[0];
            document.getElementById('last-info').innerText = `依據最新期號 [${last[1].join(', ')}] 分析歷史拖牌：`;
            let stats = {};
            last[1].forEach(n => {
                let hitCount = 0;
                for(let i=1; i<aaa.length; i++) {
                    if(aaa[i][1].includes(n)) {
                        aaa[i-1][1].forEach(nextN => {
                            stats[nextN] = (stats[nextN] || 0) + 1;
                        });
                    }
                }
            });
            let sorted = Object.entries(stats).sort((a,b) => b[1] - a[1]).slice(0, 10);
            let html = '';
            sorted.forEach(item => {
                html += `<div class="res-card"><div class="ball">${item[0]}</div><br>出現 ${item[1]} 次</div>`;
            });
            document.getElementById('drag-res').innerHTML = html;
        }
    </script>
</body>
</html>
