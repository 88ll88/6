<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>539 拖牌分析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Consolas", "微軟正黑體"; }
        body { background: #000; width: 1202px; margin: 0 auto; padding-top: 5px; overflow-x: hidden; }
        .nav-bar { width: 1202px; display: flex; gap: 1px; margin-bottom: 2px; }
        .nav-tab { flex: 1; padding: 10px 0; background: #333; color: #ccc; font-size: 12px; text-align: center; text-decoration: none; border: 1px solid #444; font-weight: bold; }
        .nav-tab.active { background: #ff9900 !important; color: #000 !important; }
        .viewport { width: 1202px; background: #fff; border: 1px solid #fff; min-height: 442px; padding: 20px; }
        .ball { display: inline-block; width: 35px; height: 35px; background: #8B0000; color: #fff; border-radius: 50%; line-height: 35px; text-align: center; font-weight: bold; margin: 10px; }
    </style>
    <script src="https://88ll88.github.io/888/aaa.js"></script>
</head>
<body>
    <div class="nav-bar">
        <a href="分佈圖.html" class="nav-tab">分佈圖</a>
        <a href="柱狀圖.html" class="nav-tab">柱狀圖</a>
        <a href="三分區.html" class="nav-tab">三分區</a>
        <a href="拖牌.html" class="nav-tab active">拖牌</a>
        <a href="遺漏.html" class="nav-tab">遺漏</a>
        <a href="統計表.html" class="nav-tab">統計表</a>
    </div>
    <div class="viewport" id="res">正在大數據分析歷史拖牌...</div>
    <script>
        window.onload = function(){
            let last = aaa[0][1], stats = {};
            last.forEach(n => {
                for(let i=1; i<aaa.length; i++){
                    if(aaa[i][1].includes(n)) aaa[i-1][1].forEach(nxt => stats[nxt] = (stats[nxt]||0)+1);
                }
            });
            let sorted = Object.entries(stats).sort((a,b)=>b[1]-a[1]).slice(0,10);
            let h = '<h3>最新號碼拖出機率最高：</h3>';
            sorted.forEach(x => h += `<div style="display:inline-block;text-align:center"><div class="ball">${x[0]}</div><br><b>${x[1]}次</b></div>`);
            document.getElementById('res').innerHTML = h;
        }
    </script>
</body>
</html>
