<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>539 柱狀圖</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Consolas", "微軟正黑體"; }
        body { background: #000; width: 1202px; margin: 0 auto; padding-top: 5px; }
        .nav-bar { width: 1202px; display: flex; gap: 1px; margin-bottom: 2px; }
        .nav-tab { flex: 1; padding: 10px 0; background: #333; color: #ccc; font-size: 12px; text-align: center; text-decoration: none; border: 1px solid #444; font-weight: bold; }
        .nav-tab.active { background: #ff9900 !important; color: #000 !important; }
        .viewport { width: 1202px; height: 442px; background: #fff; border: 1px solid #fff; position: relative; display: flex; }
        .main-bar { width: 800px; height: 380px; display: flex; align-items: flex-end; padding: 0 10px 20px 10px; }
        .pillar { flex: 1; margin: 0 2px; background: #8B0000; position: relative; border: 1px solid #000; }
        .val { position: absolute; bottom: 100%; width: 100%; text-align: center; font-size: 10px; font-weight: bold; }
        .side-ctrl { width: 200px; border-left: 2px solid #000; display: flex; flex-direction: column; background: #eee; }
        .btn-40 { height: 40px; border-bottom: 1px solid #000; background: #ddd; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }
    </style>
    <script src="https://88ll88.github.io/888/aaa.js"></script>
</head>
<body>
    <div class="nav-bar">
        <a href="分佈圖.html" class="nav-tab">分佈圖</a>
        <a href="柱狀圖.html" class="nav-tab active">柱狀圖</a>
        <a href="三分區.html" class="nav-tab">三分區</a>
        <a href="拖牌.html" class="nav-tab">拖牌</a>
        <a href="index.html" class="nav-tab" style="background:#555;">首頁</a>
    </div>
    <div class="viewport">
        <div id="main-c" class="main-bar"></div>
        <div class="side-ctrl">
            <div class="btn-40" onclick="location.href='分佈圖.html'">柱狀 ⇆ 分佈</div>
            <div class="btn-40" onclick="tgMode()">四圖 ⇆ 五圖</div>
        </div>
    </div>
    <script>
        let mode = '4-charts', tags = ["20期", "50期", "100期", "歷史"];
        function tgMode() { alert("已切換模式"); render(); }
        function render() {
            let stats = Array(40).fill(0);
            for(let i=0; i<20; i++) aaa[i][1].forEach(n => stats[parseInt(n)]++);
            let html = '';
            for(let i=1; i<=39; i++) {
                let h = stats[i] * 10; 
                html += `<div class="pillar" style="height:${h}px;"><div class="val">${stats[i]}</div></div>`;
            }
            document.getElementById('main-c').innerHTML = html;
        }
        window.onload = render;
    </script>
</body>
</html>
