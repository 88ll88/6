<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>539 柱狀圖分析 - 精準座標版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Consolas", "微軟正黑體"; }
        body { background: #f4f4f4; width: 1200px; margin: 0 auto; padding-top: 5px; }
        
        /* 1. 導航列：黑底 */
        .nav-bar { width: 1200px; display: flex; gap: 1px; margin-bottom: 2px; background: #000; padding: 1px; }
        .nav-tab { flex: 1; padding: 10px 0; background: #222; color: #fff; font-size: 12px; text-align: center; text-decoration: none; border: 1px solid #444; }
        .nav-tab.active { background: #ff9900 !important; color: #000 !important; font-weight: bold; }

        .viewport { width: 1200px; position: relative; border: 1px solid #000; background: #fff; }
        .table-row { display: flex; width: 100%; border-bottom: 1px solid #ddd; }
        
        /* 側邊全"" */
        .cell-side { width: 200px; background: #fff; display: flex; align-items: center; justify-content: center; }
        .cell-main { width: 800px; background: #fff; position: relative; border-left: 1px solid #000; border-right: 1px solid #000; }
        
        /* 2. 號碼列：黑底白字白框 */
        .header-bg { background: #000; height: 20px; }
        .num-col { flex: 1; text-align: center; color: #fff; font-size: 10px; border: 1px solid #fff; line-height: 18px; }

        .btn-toggle { 
            position: absolute; top: 0; right: 0; 
            height: 40px; width: 200px; 
            background: #ff9900; color: #000; 
            border: 2px solid #000; cursor: pointer; 
            font-size: 18px; font-weight: bold; z-index: 100;
        }

        .chart-area { width: 100%; height: 100%; position: relative; overflow: hidden; }
        .bar { position: absolute; bottom: 0; width: 16px; border-radius: 1px 1px 0 0; z-index: 10; }
        .bar-count { position: absolute; width: 100%; text-align: center; color: #000; font-weight: bold; }
        
        .bg-purple { background: #800080; }
        .bg-red { background: #FF0000; }
        .bg-blue { background: #0000FF; }
        .bg-green { background: #008000; }

        /* 3. 座標黑線與紅虛線 */
        .line-black { position: absolute; left: 0; width: 100%; border-top: 1px solid #000; z-index: 5; pointer-events: none; }
        .line-red { position: absolute; left: 0; width: 100%; border-top: 1px dashed red; z-index: 6; pointer-events: none; }
    </style>
    <script src="aaa.js"></script>
</head>
<body>

    <div class="nav-bar">
        <a href="分佈圖.html" class="nav-tab">分佈圖</a>
        <a href="柱狀圖.html" class="nav-tab active">柱狀圖</a>
        <a href="三分區.html" class="nav-tab">三分區</a>
        <a href="拖牌.html" class="nav-tab">拖牌</a>
        <a href="遺漏.html" class="nav-tab">遺漏</a>
        <a href="統計表.html" class="nav-tab">統計表</a>
    </div>

    <div class="viewport">
        <button class="btn-toggle" onclick="toggleZoom()">縮放 ⇆ 展開</button>
        <div class="table-row header-bg">
            <div class="cell-side" style="background:#000;">""</div>
            <div class="cell-main" id="header-nums" style="display:flex; border:none; background:#000;"></div>
            <div class="cell-side" style="background:#000;">""</div>
        </div>
        <div id="main-content"></div>
    </div>

<script>
    let isZoomed = false; 

    function getStats(targetNum) {
        let stats = Array(40).fill(0);
        for (let i = 1; i < aaa.length; i++) {
            if (aaa[i][1].includes(targetNum)) {
                aaa[i-1][1].forEach(winN => stats[parseInt(winN)]++);
            }
        }
        return stats.slice(1);
    }

    function toggleZoom() {
        isZoomed = !isZoomed;
        render();
    }

    function render() {
        if (typeof aaa === 'undefined') return;
        const container = document.getElementById('main-content');
        const latestNums = aaa[0][1];
        const numToProcess = isZoomed ? latestNums : [latestNums[0]];
        
        const rowHeight = isZoomed ? 100 : 400; 
        const floorPx = isZoomed ? 5 : 20;        
        const ceilPx = isZoomed ? 95 : 380;       
        const redLineY = isZoomed ? 90 : 360;      

        let html = '';
        numToProcess.forEach(n => {
            const data = getStats(n);
            const sorted = [...data].sort((a,b)=>b-a);
            const currentMax = sorted[0];
            const currentMin = sorted[sorted.length - 1];
            const countDiff = (currentMax - currentMin) || 1;
            const pxDiff = ceilPx - floorPx;

            const r1 = sorted[0], r2 = sorted[1], r3 = sorted[2];

            html += `
                <div class="table-row">
                    <div class="cell-side" style="height:${rowHeight}px">""</div>
                    <div class="cell-main" style="height:${rowHeight}px">
                        <div class="chart-area">
                            <div class="line-black" style="bottom: ${ceilPx}px;"></div> <div class="line-black" style="bottom: ${floorPx}px;"></div> <div class="line-red" style="bottom: ${redLineY}px;"></div>  ${data.map((val, idx) => {
                                let colorCls = "bg-purple";
                                if (val === r1 && val > 0) colorCls = "bg-red";
                                else if (val === r2 && val > 0) colorCls = "bg-blue";
                                else if (val === r3 && val > 0) colorCls = "bg-green";

                                let finalH = floorPx + (val - currentMin) * (pxDiff / countDiff);
                                if (finalH < 2) finalH = 2;

                                let leftPos = idx * (800 / 39) + 2;
                                let fontSize = isZoomed ? 9 : 11;
                                let textTop = isZoomed ? -12 : -18;

                                return `
                                    <div class="bar ${colorCls}" style="height:${finalH}px; left:${leftPos}px; width:16px;">
                                        <div class="bar-count" style="font-size:${fontSize}px; top:${textTop}px;">${val}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                    <div class="cell-side" style="height:${rowHeight}px">""</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    document.getElementById('header-nums').innerHTML = Array.from({length:39}, (_,i)=>(i+1).toString().padStart(2,'0')).map(n=>
        `<div class="num-col">${n}</div>`
    ).join('');

    window.onload = render;
</script>
</body>
</html>
