<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>539 數據決策系統</title>
    <link rel="stylesheet" href="styles.css">
<style>
    /* 這裡是你指定的按鈕特效 */
    .btn {
        position: relative;
        background: #333333;
        border: 1px solid #444;
        color: #FFFFFF;
        font-weight: bold;
        text-align: center;
        overflow: hidden;
        cursor: pointer;
        transition: color 300ms;
    }
    .btn span {
        position: relative;
        z-index: 100; /* 確保字在特效上面 */
    }
    .btn:before, .btn:after {
        content: '';
        position: absolute;
        height: 120%; width: 120%;
        top: 0; left: 0;
    }
    .btn:before {
        transform: translate3d(-100%, 0, 0);
        background-color: #FFFFFF;
        transition: transform 300ms cubic-bezier(0.55, 0.055, 0.675, 0.19);
    }
    .btn:after {
        background-color: #ffd1d8; /* 你指定的粉紅色 */
        transform: translate3d(100%, 0, 0);
        transition: transform 300ms 300ms cubic-bezier(0.16, 0.73, 0.58, 0.62);
    }
    .btn:hover:before, .btn:hover:after {
        transform: translate3d(0, 0, 0);
    }
    .btn:hover span {
        color: #000; /* 滑過去字變黑才清楚 */
    }
</style>
</head>
<body>
<script>
    function navBar() {
    // 鎖定寬度 1200px，背景黑 (#000)
    var n = `<div style="width:1200px; margin:5px auto; display:flex; gap:1px; background:#000; padding:1px;">`;
    
    // 定義你要的按鈕名稱
    var menu = ["分佈圖", "柱狀圖", "拖牌", "遺漏", "三分區", "統計表"];
    
    menu.forEach(t => {
        // 重點：location.href 裡面的單引號已經補好
        n += `<div class="btn" 
                   onclick="location.href='${t}.html'" 
                   style="width:80px; height:30px; display:flex; align-items:center; justify-content:center; font-size:13px;">
                <span>${t}</span>
              </div>`;
    });

    n += `</div>`;
    
    // 直接噴到網頁上
    document.write(n);
}

// 執行，導航列就出來了
navBar();

</script>
</body>
</html>
