<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>539 分佈圖 - 次數常駐版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Consolas", "微軟正黑體"; }
        body { background: #f4f4f4; width: 1200px; margin: 0 auto; padding-top: 5px; }
        
        /* 寬度定義 */
        .w-100 { width: 100px; flex-shrink: 0; }
        .w-780 { width: 780px; flex-shrink: 0; display: flex; }
        .w-20 { width: 20px; flex-shrink: 0; text-align: center; }
        .w-200 { width: 200px; flex-shrink: 0; }

        .nav-bar { width: 1200px; display: flex; gap: 1px; margin-bottom: 2px; background: #000; padding: 1px; }
        .nav-tab { flex: 1; padding: 10px 0; background: #222; color: #fff; font-size: 12px; text-align: center; text-decoration: none; border: 1px solid #444; }
        .nav-tab.active { background: #ff9900 !important; color: #000 !important; font-weight: bold; }

        .viewport { width: 1200px; border: 1px solid #000; background: #fff; }
        .row-black { background: #000; color: #fff; font-size: 12px; font-weight: bold; height: 20px; line-height: 18px; display: flex; }
        .cell-border { border: 1px solid #fff; }

        /* 捲軸區 */
        .scroll-area { height: 400px; overflow-y: scroll; background: #fff; border-bottom: 2px solid #000; }
        .row-data { display: flex; height: 20px; line-height: 20px; border-bottom: 1px solid #ddd; font-size: 11px; }
        .c-date, .c-nums { width: 100px; border-right: 1px solid #ddd; text-align: center; cursor: pointer; flex-shrink: 0; }
        .c-nums { border-right: 1px solid #000; font-weight: bold; }

        .ball-zone { width: 780px; display: flex; flex-shrink: 0; }
        .ball-slot { width: 20px; height: 20px; border-right: 1px solid #eee; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .ball { width: 18px; height: 18px; border-radius: 50%; color: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 11px; }
        
        .ball-darkred { background: #8b0000; } 
        .ball-red { background: #ff0000; }
        .ball-blue { background: #00008b; }

        .c-sharp { width: 20px; border-right: 1px solid #ddd; text-align: center; flex-shrink: 0; background: #f9f9f9; font-weight: bold; }

        /* 第 21 列：常駐統計次數 */
        .row-stat { background: #e0e0e0; height: 20px; line-height: 20px; display: flex; font-size: 12px; font-weight: bold; border-bottom: 1px solid #000; color: #000; }
        .stat-label { width: 200px; display: flex; justify-content: space-between; padding: 0 5px; flex-shrink: 0; }

        /* 第 22 列：可切換柱狀圖 */
        #chart-panel { display: block; }
        .row-chart { height: 100px; display: flex; background: #fff; border-bottom: 1px solid #000; }
        .chart-main { width: 780px; height: 100px; position: relative; border-left: 1px solid #000; border-right: 1px solid #000; flex-shrink: 0; }
        .bar { position: absolute; bottom: 0; width: 14px; background: #800080; z-index: 10; border: 1px solid #fff; }
        .line-red { position: absolute; left: 0; width: 100%; border-top: 1px dashed red; z-index: 5; }

        .footer-clickable { cursor: pointer; }
        .pointer { cursor: pointer; }
    </style>
    <script src="aaa.js"></script>
</head>
<body>

    <div class="nav-bar">
        <a href="#" class="nav-tab active">分佈圖</a>
        <a href="#" class="nav-tab">柱狀圖</a>
        <a href="#" class="nav-tab">三分區</a>
        <a href="#" class="nav-tab">拖牌</a>
        <a href="#" class="nav-tab">遺漏</a>
    </div>

    <div class="viewport">
        <div class="row-black">
            <div id="head-date" class="cell-border w-100 pointer" onclick="toggleDateMode()">日期</div>
            <div id="head-sort" class="cell-border w-100 pointer" onclick="toggleSortMode()">號碼</div>
            <div class="w-780" id="header-0139"></div>
            <div class="cell-border w-20">#</div>
            <div class="cell-border w-200">Right</div>
        </div>

        <div class="scroll-area" id="main-content"></div>

        <div class="row-stat">
            <div class="stat-label">
                <span id="stat-total">共?期</span>
                <span id="stat-max-label">次數 0</span>
            </div>
            <div class="w-780" id="stat-cells"></div>
            <div class="w-20"></div>
            <div class="w-200"></div>
        </div>

        <div id="chart-panel">
            <div class="row-chart">
                <div class="w-200" style="background:#fff;"></div>
                <div class="chart-main" id="chart-area"></div>
                <div class="w-220" style="background:#fff;"></div>
            </div>
        </div>

        <div class="row-black footer-clickable" style="margin-top:2px;" onclick="toggleOnlyChart()">
            <div class="cell-border w-200" style="text-align:right; padding-right:10px;">號碼 (點擊開關柱狀圖)</div>
            <div class="w-780" id="footer-0139"></div>
            <div class="cell-border w-220"></div>
        </div>
    </div>

<script>
    let dateMode = 0; 
    let sortMode = 0; 
    const displayCount = 30;

    // 只切換柱狀圖顯示狀態
    function toggleOnlyChart() {
        const panel = document.getElementById('chart-panel');
        panel.style.display = (panel.style.display === 'none') ? 'block' : 'none';
    }

    function toggleDateMode() { dateMode = 1 - dateMode; render(); }
    function toggleSortMode() { sortMode = (sortMode + 1) % 3; render(); }

    function render() {
        if (typeof aaa === 'undefined') return;
        const container = document.getElementById('main-content');
        const dataSlice = aaa.slice(0, displayCount);
        let counts = Array(40).fill(0);

        const sortLabels = ["號碼", "遞增", "落球序"];
        document.getElementById('head-sort').innerText = sortLabels[sortMode];
        document.getElementById('head-date').innerText = (dateMode === 0) ? "日期" : "期次";

        let html = '';
        dataSlice.forEach((row, index) => {
            const dateStr = row[0]; const winNums = row[1]; const idStr = row[2]; const dropNums = row[3];
            let displayNums = [];
            let ballClass = "";

            if (sortMode === 0) { displayNums = [...winNums]; ballClass = "ball-darkred"; }
            else if (sortMode === 1) { displayNums = [...winNums].sort((a,b)=>a-b); ballClass = "ball-red"; }
            else { displayNums = [...dropNums]; ballClass = "ball-blue"; }

            html += `<div class="row-data">
                <div class="c-date" onclick="toggleDateMode()">${dateMode === 0 ? dateStr : idStr}</div>
                <div class="c-nums" onclick="toggleSortMode()">${displayNums.join(',')}</div>
                <div class="ball-zone">
                    ${Array.from({length:39}, (_, i) => {
                        const n = (i + 1).toString().padStart(2, '0');
                        const hit = winNums.includes(n);
                        if(hit) counts[i+1]++;
                        return `<div class="ball-slot">${hit ? `<div class="ball ${ballClass}">${n}</div>` : ''}</div>`;
                    }).join('')}
                </div>
                <div class="c-sharp">${index + 1}</div>
                <div class="w-200">""</div>
            </div>`;
        });
        container.innerHTML = html;

        // 更新統計數據 (21列)
        const maxC = Math.max(...counts.slice(1)) || 1;
        document.getElementById('stat-total').innerText = `共${displayCount}期`;
        document.getElementById('stat-max-label').innerText = `次數 ${maxC}`;
        document.getElementById('stat-cells').innerHTML = counts.slice(1).map(c => 
            `<div class="ball-slot" style="border-right:1px solid #bbb; color:#000;">${c > 0 ? c : ''}</div>`
        ).join('');

        // 更新柱狀圖 (22列)
        const chartArea = document.getElementById('chart-area');
        let chartHtml = `<div class="line-red" style="bottom: 80px;"></div>`;
        counts.slice(1).forEach((val, idx) => {
            if (val > 0) {
                let h = (val / maxC) * 95;
                chartHtml += `<div class="bar" style="height:${h}px; left:${idx*20+3}px;"></div>`;
            }
        });
        chartArea.innerHTML = chartHtml;
    }

    const numLine = Array.from({length:39}, (_, i) => 
        `<div style="width:20px; border-right:1px solid #fff; text-align:center; flex-shrink:0;">${(i+1).toString().padStart(2,'0')}</div>`
    ).join('');
    document.getElementById('header-0139').innerHTML = numLine;
    document.getElementById('footer-0139').innerHTML = numLine;

    window.onload = render;
</script>
</body>
</html>
