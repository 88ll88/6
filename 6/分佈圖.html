<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>分佈圖</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Consolas", "微軟正黑體"; }
        body { background: #000; width: 1202px; margin: 0 auto; padding-top: 5px; overflow-x: hidden; }
        .nav-bar { width: 1202px; display: flex; gap: 1px; margin-bottom: 2px; }
        .nav-tab { flex: 1; padding: 10px 0; background: #333; color: #ccc; font-size: 12px; text-align: center; text-decoration: none; border: 1px solid #444; font-weight: bold; }
        .nav-tab.active { background: #ff9900 !important; color: #000 !important; }
        .viewport { width: 1202px; background: #fff; border: 1px solid #fff; min-height: 442px; position: relative; }
        .row-20 { height: 20px; border-bottom: 1px solid #eee; display: flex; font-size: 11px; line-height: 20px; }
        .lamp { width: 18px; height: 18px; border-radius: 50%; background: #FF0000; color: #fff; margin: 1px auto; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
    <script src="https://88ll88.github.io/888/aaa.js"></script>
</head>
<body>
    <div class="nav-bar">
        <a href="分佈圖.html" class="nav-tab active">分佈圖</a>
        <a href="柱狀圖.html" class="nav-tab">柱狀圖</a>
        <a href="三分區.html" class="nav-tab">三分區</a>
        <a href="拖牌.html" class="nav-tab">拖牌</a>
        <a href="遺漏.html" class="nav-tab">遺漏</a>
        <a href="統計表.html" class="nav-tab">統計表</a>
    </div>
    <div class="viewport" id="data-layer"></div>
    <script>
        window.onload = function(){
            let h = '';
            for(let r=0; r<18; r++){
                let n = aaa[r][1];
                h += `<div class="row-20"><div style="width:100px;text-align:center">${aaa[r][0].split('(')[0]}</div><div style="width:1100px;display:flex">`;
                for(let i=1;i<=39;i++){
                    let b = i<10?'0'+i:''+i;
                    h += `<div style="width:28px;text-align:center;border-right:1px solid #f0f0f0">${n.includes(b)?`<div class="lamp">${b}</div>`:r+1}</div>`;
                }
                h += `</div></div>`;
            }
            document.getElementById('data-layer').innerHTML = h;
        }
    </script>
</body>
</html>
