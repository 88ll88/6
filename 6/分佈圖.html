<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>539 分佈圖</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Consolas", "微軟正黑體"; }
        body { background: #000; width: 1200px; margin: 0 auto; padding-top: 5px; }
        
        .nav-bar { width: 1200px; display: flex; gap: 1px; margin-bottom: 2px; }
        .nav-tab { flex: 1; padding: 10px 0; background: #333; color: #ccc; font-size: 12px; text-align: center; text-decoration: none; border: 1px solid #444; }
        .nav-tab.active { background: #ff9900 !important; color: #000 !important; font-weight: bold; }

        .viewport { width: 1200px; background: #fff; border: 1px solid #666; }
        .grid-row { display: flex; height: 20px; border-bottom: 1px solid #ddd; align-items: center; }
        
        /* 基礎單元格：預設黑底白字白框 */
        .cell { height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; 
                background: #000; color: #fff; border-right: 1px solid #fff; }
        
        /* 寬度定義 */
        .w-100 { width: 100px; }
        .w-780 { width: 780px; display: flex; }
        .w-20  { width: 20px; }
        .w-200 { width: 200px; }

        /* 數據區中間的白色背景 (覆蓋黑底) */
        .data-row .w-100, .data-row .w-20 { background: #fdfdfd; color: #333; border-right: 1px solid #eee; }
        .data-row .w-780 .cell { background: #fff; color: #333; border-right: 1px solid #eee; }

        /* 亮燈圓圈 */
        .lamp { width: 18px; height: 18px; border-radius: 50%; color: #fff; font-weight: bold; font-size: 10px; line-height: 18px; text-align: center; }
        .lamp-red { background: #FF0000; }
        .lamp-blue { background: #0000BB; }
        .lamp-darkred { background: #8B0000; }

        /* 尾列文字靠右 */
        .text-right { justify-content: flex-end; padding-right: 10px; }
    </style>

    <script src="aaa.js"></script>
</head>
<body>

    <div class="nav-bar">
        <a href="分佈圖.html" class="nav-tab active">分佈圖</a>
        <a href="柱狀圖.html" class="nav-tab">柱狀圖</a>
        <a href="三分區.html" class="nav-tab">三分區</a>
        <a href="拖牌.html" class="nav-tab">拖牌</a>
        <a href="遺漏.html" class="nav-tab">遺漏</a>
        <a href="統計表.html" class="nav-tab">統計表</a>
    </div>

    <div class="viewport">
        <div class="grid-row">
            <div class="cell w-100" onclick="toggleDate()" id="h-date">日期</div>
            <div class="cell w-100" onclick="toggleSort()" id="h-sort">號碼紅圈</div>
            <div class="w-780">
                <script>
                    for(let i=1; i<=39; i++) {
                        let num = i < 10 ? '0' + i : i;
                        document.write(`<div class="cell w-20">${num}</div>`);
                    }
                </script>
            </div>
            <div class="cell w-20">#</div>
            <div class="cell w-200">備註</div>
        </div>
        
        <div id="data-container"></div>
    </div>

<script>
    let isIssueMode = false; 
    let sortMode = 0; 
    const modes = [
        { label: "號碼紅圈", color: "lamp-red" },
        { label: "遞增深藍", color: "lamp-blue" },
        { label: "落球深紅", color: "lamp-darkred" }
    ];

    function toggleDate() { isIssueMode = !isIssueMode; render(); }
    function toggleSort() { sortMode = (sortMode + 1) % 3; render(); }

    function render() {
        const container = document.getElementById('data-container');
        if (typeof aaa === 'undefined') return;

        document.getElementById('h-date').innerText = isIssueMode ? "期次" : "日期";
        document.getElementById('h-sort').innerText = modes[sortMode].label;

        let html = '';
        // 渲染 20 行數據
        for (let r = 0; r < 20; r++) {
            if (!aaa[r]) break;
            let displayDate = isIssueMode ? aaa[r][2] : aaa[r][0].split('(')[0];
            let currentNums = (sortMode === 2) ? (aaa[r][3] || aaa[r][1]) : aaa[r][1];

            html += `<div class="grid-row data-row">`;
            html += `<div class="cell w-100" onclick="toggleDate()">${displayDate}</div>`;
            html += `<div class="cell w-100" onclick="toggleSort()" style="color:blue;">${currentNums.join(',')}</div>`;
            html += `<div class="w-780">`;
            for (let i = 1; i <= 39; i++) {
                let b = i < 10 ? '0' + i : '' + i;
                let isHit = aaa[r][1].includes(b);
                html += `<div class="cell w-20" onclick="toggleSort()">${isHit ? `<div class="lamp ${modes[sortMode].color}">${b}</div>` : r+1}</div>`;
            }
            html += `</div><div class="cell w-20">${r+1}</div><div class="cell w-200"></div></div>`;
        }

        // 下方尾列
        html += `<div class="grid-row">`;
        html += `<div class="cell w-200 text-right">號碼</div>`; // 100+100=200
        html += `<div class="w-780">`;
        for (let i = 1; i <= 39; i++) {
            let num = i < 10 ? '0' + i : i;
            html += `<div class="cell w-20">${num}</div>`;
        }
        html += `</div>`;
        html += `<div class="cell w-20"></div>`; // 20 空白
        html += `<div class="cell w-200"></div>`; // 200 空白
        html += `</div>`;

        container.innerHTML = html;
    }

    window.onload = render;
</script>
</body>
</html>
