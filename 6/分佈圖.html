<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>539 分佈圖 - 數量連動版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Consolas", "微軟正黑體"; }
        body { background: #f4f4f4; width: 1200px; margin: 0 auto; padding-top: 5px; }
        .w-100 { width: 100px; flex-shrink: 0; }
        .w-780 { width: 780px; flex-shrink: 0; display: flex; }
        .w-20 { width: 20px; flex-shrink: 0; }
        .w-200 { width: 200px; flex-shrink: 0; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .pointer { cursor: pointer; user-select: none; }

        .viewport { width: 1200px; border: 1px solid #000; background: #fff; }
        .row-black { background: #000; color: #fff; font-size: 12px; font-weight: bold; height: 20px; display: flex; }
        
        /* 捲軸區：高度固定，內容會根據 curP (30/50/200) 同步伸長 */
        .scroll-area { height: 400px; overflow-y: scroll; border-bottom: 2px solid #000; }
        .row-data { display: flex; height: 20px; border-bottom: 1px solid #ddd; font-size: 11px; }
        .ball-slot { width: 20px; height: 20px; border-right: 1px solid #eee; flex-shrink: 0; }
        .ball { width: 18px; height: 18px; border-radius: 50%; color: #fff; font-weight: bold; margin: 1px auto; display: flex; align-items: center; justify-content: center; }

        .row-period { background: #fdf2d0; height: 20px; display: flex; font-size: 11px; font-weight: bold; border-bottom: 1px solid #999; cursor: pointer; }
        .row-history { background: #e0e0e0; height: 20px; display: flex; font-size: 9px; font-weight: bold; border-bottom: 1px solid #000; }
        .label-zone { width: 200px; border-right: 1px solid #999; text-align: center; line-height: 20px; }

        .row-chart { height: 110px; display: flex; background: #fff; position: relative; }
        .chart-main { width: 780px; height: 110px; position: relative; border-right: 1px solid #000; }
        .bar-box { position: absolute; bottom: 0; width: 20px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; z-index: 2; }
        .bar { width: 14px; background: #800080; border: 1px solid #fff; }
        .bar-red { background: #ff0000 !important; }
        .line-red-dash { position: absolute; left: 0; width: 100%; border-top: 1px dashed red; z-index: 1; top: 30px; } /* 110-80=30px */
        .sep-line { width: 1200px; height: 2px; background: #000; }
    </style>
</head>
<body>

<div class="viewport">
    <div class="row-black">
        <div class="w-100 flex-center pointer" onclick="toggleDate()">日期</div>
        <div id="sort-label" class="w-100 flex-center pointer" onclick="toggleSort()">號碼</div>
        <div id="h-nums" class="w-780 flex-center"></div>
        <div class="w-20 flex-center">#</div>
        <div class="w-200"></div>
    </div>

    <div id="main-content" class="scroll-area"></div>

    <div class="row-period" onclick="cycleP()">
        <div class="label-zone" id="p-title">近期統計 (30期) ▽</div>
        <div id="p-cells" class="w-780 flex-center"></div>
        <div class="w-220"></div>
    </div>

    <div class="row-history">
        <div class="label-zone">歷史總次數</div>
        <div id="s-cells" class="w-780 flex-center"></div>
        <div class="w-220" style="background:#ccc;"></div>
    </div>

    <div id="chart-panel" class="row-chart">
        <div class="w-200 flex-center" style="font-size:10px; color:red;">80px -- 紅色虛線</div>
        <div id="c-area" class="chart-main"></div>
        <div class="w-220"></div>
    </div>

    <div id="sep" class="sep-line"></div>

    <div class="row-black pointer" onclick="toggleChart()">
        <div class="w-200 flex-center" style="border-right: 1px solid #fff;">隱藏/顯示柱狀圖</div>
        <div id="f-nums" class="w-780 flex-center"></div>
        <div class="w-220"></div>
    </div>
</div>

<script src="aaa.js"></script>
<script>
    let pIdx = 0, dateMode = 0, sortMode = 0;
    const steps = [30, 50, 80, 100, 150, 200];
    const sortNames = ["號碼", "遞增", "落球序"];

    function cycleP() { pIdx = (pIdx + 1) % steps.length; render(); }
    function toggleDate() { dateMode = 1 - dateMode; render(); }
    function toggleSort() { sortMode = (sortMode + 1) % 3; render(); }
    function toggleChart() {
        let cp = document.getElementById('chart-panel');
        let sp = document.getElementById('sep');
        let isOff = cp.style.display === 'none';
        cp.style.display = isOff ? 'flex' : 'none';
        sp.style.display = isOff ? 'block' : 'none';
    }

    function render() {
        if (!window.aaa) return;
        const cur = steps[pIdx]; // 這就是你點的 30, 50, 100...
        document.getElementById('p-title').innerText = `近期統計 (${cur}期) ▽`;
        document.getElementById('sort-label').innerText = sortNames[sortMode];

        let pCounts = Array(40).fill(0), hCounts = Array(40).fill(0);
        aaa.forEach(r => r[1].forEach(n => hCounts[parseInt(n)]++));
        let top3 = hCounts.slice(1).map((v, i) => ({v, i: i+1})).sort((a,b)=>b.v-a.v).slice(0,3).map(x=>x.i);

        let html = '';
        // 關鍵連動：中間數據列根據 cur (點擊的期數) 來 slice 生成行數
        aaa.slice(0, cur).forEach((row, i) => {
            row[1].forEach(n => pCounts[parseInt(n)]++);
            let win = row[1];
            let dVal = dateMode === 0 ? row[0] : row[2];
            let show = (sortMode === 0) ? [...win] : (sortMode === 1 ? [...win].sort((a,b)=>a-b) : [...row[3]]);
            let bColor = (sortMode === 0) ? "#8b0000" : (sortMode === 1 ? "#ff0000" : "#00008b");

            html += `<div class="row-data">
                <div class="w-100 flex-center pointer" onclick="toggleDate()">${dVal}</div>
                <div class="w-100 flex-center pointer" style="font-weight:bold; border-right:1px solid #000;" onclick="toggleSort()">${show.join(',')}</div>
                <div class="w-780 flex-center">${Array.from({length:39},(_,j)=>{
                    let n = (j+1).toString().padStart(2,'0');
                    return `<div class="ball-slot">${win.includes(n)?`<div class="ball" style="background:${bColor}">${n}</div>`:''}</div>`;
                }).join('')}</div>
                <div class="w-20 flex-center" style="background:#eee;">${i+1}</div>
                <div class="w-200"></div>
            </div>`;
        });
        
        document.getElementById('main-content').innerHTML = html;
        document.getElementById('p-cells').innerHTML = pCounts.slice(1).map(c => `<div class="ball-slot flex-center">${c||''}</div>`).join('');
        document.getElementById('s-cells').innerHTML = hCounts.slice(1).map(c => `<div class="ball-slot flex-center" style="color:#c00;">${c}</div>`).join('');

        const max = Math.max(...hCounts.slice(1)), min = Math.min(...hCounts.slice(1));
        let cH = '<div class="line-red-dash"></div>';
        hCounts.slice(1).forEach((v, i) => {
            let h = 5 + (v - min) * (95 / (max - min || 1));
            cH += `<div class="bar-box" style="left:${i*20}px; height:110px;">
                <div style="font-size:9px; margin-bottom:2px; font-weight:bold;">${v}</div>
                <div class="bar ${top3.includes(i+1)?'bar-red':''}" style="height:${h}px;"></div>
            </div>`;
        });
        document.getElementById('c-area').innerHTML = cH;
    }

    window.onload = () => {
        const ns = Array.from({length:39},(_,i)=>`<div style="width:20px; text-align:center;">${(i+1).toString().padStart(2,'0')}</div>`).join('');
        document.getElementById('h-nums').innerHTML = ns;
        document.getElementById('f-nums').innerHTML = ns;
        render();
    };
</script>
</body>
</html>
