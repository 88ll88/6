<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>539 分佈圖</title>
    <style>
        /* 鎖定寬度與格線 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Consolas", "微軟正黑體"; }
        body { background: #000; width: 1202px; margin: 0 auto; padding-top: 5px; }
        
        .nav-bar { width: 1202px; display: flex; gap: 1px; margin-bottom: 2px; }
        .nav-tab { flex: 1; padding: 10px 0; background: #333; color: #ccc; font-size: 12px; text-align: center; text-decoration: none; border: 1px solid #444; }
        .nav-tab.active { background: #ff9900 !important; color: #000 !important; font-weight: bold; }

        .viewport { width: 1202px; background: #fff; border: 1px solid #666; }
        .grid-row { display: flex; height: 20px; border-bottom: 1px solid #ddd; align-items: center; }
        .cell { width: 20px; height: 20px; border-right: 1px solid #eee; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; }
        
        /* 欄位寬度鎖死 */
        .w-date { width: 100px; background: #fdfdfd; font-weight: bold; border-right: 2px solid #ccc; }
        .w-nums { width: 100px; background: #fdfdfd; font-weight: bold; border-right: 2px solid #ccc; font-size: 10px; color: blue; }
        .w-balls { width: 780px; display: flex; }
        .w-index { width: 20px; background: #f0f0f0; }

        /* 亮燈圓圈 */
        .lamp { width: 18px; height: 18px; border-radius: 50%; color: #fff; font-weight: bold; font-size: 10px; line-height: 18px; text-align: center; }
        .lamp-red { background: #FF0000; }
        .lamp-blue { background: #0000BB; }
        .lamp-darkred { background: #8B0000; }

        /* 黑色底部 */
        .footer-black { background: #000 !important; color: #fff !important; }
        .footer-black .cell { color: #fff; border-right: 1px solid #444; }
    </style>

    <script src="aaa.js"></script>
</head>
<body>

    <div class="nav-bar">
        <a href="分佈圖.html" class="nav-tab active">分佈圖</a>
        <a href="柱狀圖.html" class="nav-tab">柱狀圖</a>
        <a href="三分區.html" class="nav-tab">三分區</a>
        <a href="拖牌.html" class="nav-tab">拖牌</a>
        <a href="遺漏.html" class="nav-tab">遺漏</a>
        <a href="統計表.html" class="nav-tab">統計表</a>
    </div>

    <div class="viewport">
        <div class="grid-row" style="background:#eee; font-weight:bold;">
            <div class="cell w-date" onclick="toggleDate()" id="h-date">日期</div>
            <div class="cell w-nums" onclick="toggleSort()" id="h-sort">號碼紅圈</div>
            <div class="w-balls">
                <script>for(let i=1; i<=39; i++) document.write(`<div class="cell">${i<10?'0'+i:i}</div>`);</script>
            </div>
            <div class="cell w-index">#</div>
        </div>
        <div id="data-container"></div>
    </div>

<script>
    let isIssueMode = false; 
    let sortMode = 0; 
    const modes = [
        { label: "號碼紅圈", color: "lamp-red" },
        { label: "遞增深藍", color: "lamp-blue" },
        { label: "落球深紅", color: "lamp-darkred" }
    ];

    function toggleDate() { isIssueMode = !isIssueMode; render(); }
    function toggleSort() { sortMode = (sortMode + 1) % 3; render(); }

    function render() {
        const container = document.getElementById('data-container');
        if (typeof aaa === 'undefined') {
            container.innerHTML = '<div style="color:red; padding:20px;">找不到 aaa.js 數據，請確認檔案在同資料夾。</div>';
            return;
        }

        document.getElementById('h-date').innerText = isIssueMode ? "期次" : "日期";
        document.getElementById('h-sort').innerText = modes[sortMode].label;

        let html = '';
        for (let r = 0; r < 20; r++) {
            if (!aaa[r]) break;
            
            // 抓取對應欄位
            let displayDate = isIssueMode ? aaa[r][2] : aaa[r][0].split('(')[0];
            let currentNums = (sortMode === 2) ? (aaa[r][3] || aaa[r][1]) : aaa[r][1];

            html += `<div class="grid-row">`;
            html += `<div class="cell w-date" onclick="toggleDate()">${displayDate}</div>`;
            html += `<div class="cell w-nums" onclick="toggleSort()">${currentNums.join(',')}</div>`;
            html += `<div class="w-balls">`;
            for (let i = 1; i <= 39; i++) {
                let b = i < 10 ? '0' + i : '' + i;
                let isHit = aaa[r][1].includes(b);
                // 號碼球區點擊也能切換
                html += `<div class="cell" onclick="toggleSort()">${isHit ? `<div class="lamp ${modes[sortMode].color}">${b}</div>` : r+1}</div>`;
            }
            html += `</div><div class="cell w-index">${r+1}</div></div>`;
        }

        // 黑尾列
        html += `<div class="grid-row footer-black"><div class="cell w-date">[]</div><div class="cell w-nums">[]</div><div class="w-balls">`;
        for (let i = 1; i <= 39; i++) html += `<div class="cell">[]</div>`;
        html += `</div><div class="cell w-index">[]</div></div>`;

        container.innerHTML = html;
    }

    window.onload = render;
</script>
</body>
</html>
