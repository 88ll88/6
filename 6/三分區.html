<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>539 三分區分析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Consolas", "微軟正黑體"; }
        body { background: #000; width: 1202px; margin: 0 auto; padding-top: 5px; overflow-x: hidden; }
        .nav-bar { width: 1202px; display: flex; gap: 1px; margin-bottom: 2px; }
        .nav-tab { flex: 1; padding: 10px 0; background: #333; color: #ccc; font-size: 12px; text-align: center; text-decoration: none; border: 1px solid #444; font-weight: bold; }
        .nav-tab.active { background: #ff9900 !important; color: #000 !important; }
        
        .viewport { width: 1202px; background: #fff; border: 1px solid #fff; min-height: 442px; }
        .row-head { display: flex; background: #444; color: #fff; height: 30px; line-height: 30px; font-size: 13px; font-weight: bold; text-align: center; }
        .row-25 { display: flex; height: 25px; border-bottom: 1px solid #eee; align-items: center; font-size: 11px; }
        
        .c-date { width: 100px; border-right: 1px solid #ccc; text-align: center; }
        .zone-box { width: 354px; display: flex; border-right: 2px solid #000; justify-content: space-evenly; }
        .ball { width: 20px; height: 20px; text-align: center; line-height: 20px; border-radius: 50%; font-weight: bold; color: #ccc; }
        
        /* 三區顏色區分 */
        .hit-1 { background: #FF0000; color: #fff; } /* 一區紅 */
        .hit-2 { background: #0000BB; color: #fff; } /* 二區藍 */
        .hit-3 { background: #8B0000; color: #fff; } /* 三區深紅 */
    </style>
    <script src="https://88ll88.github.io/888/aaa.js"></script>
</head>
<body>
    <div class="nav-bar">
        <a href="分佈圖.html" class="nav-tab">分佈圖</a>
        <a href="柱狀圖.html" class="nav-tab">柱狀圖</a>
        <a href="三分區.html" class="nav-tab active">三分區</a>
        <a href="拖牌.html" class="nav-tab">拖牌</a>
        <a href="遺漏.html" class="nav-tab">遺漏</a>
        <a href="統計表.html" class="nav-tab">統計表</a>
    </div>

    <div class="viewport" id="app">
        <div class="row-head">
            <div style="width:100px;">期次</div>
            <div style="width:354px; border-right:2px solid #fff;">第一區 (01-13)</div>
            <div style="width:354px; border-right:2px solid #fff;">第二區 (14-26)</div>
            <div style="width:354px;">第三區 (27-39)</div>
        </div>
        <div id="data-list"></div>
    </div>

    <script>
        window.onload = function() {
            let html = '';
            for(let r=0; r<18; r++) {
                let row = aaa[r];
                let nums = row[1].map(Number);
                let issue = row[0].match(/\(([^)]+)\)/)[1];
                html += `<div class="row-25"><div class="c-date">${issue}</div>`;
                
                // 渲染三區
                [[1,13,1], [14,26,2], [27,39,3]].forEach(z => {
                    html += `<div class="zone-box">`;
                    for(let i=z[0]; i<=z[1]; i++) {
                        let isHit = nums.includes(i);
                        html += `<div class="ball ${isHit?'hit-'+z[2]:''}">${i<10?'0'+i:i}</div>`;
                    }
                    html += `</div>`;
                });
                html += `</div>`;
            }
            document.getElementById('data-list').innerHTML = html;
        }
    </script>
</body>
</html><!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>539 實戰 20 圖全矩陣</title>
    <style>
        :root { --u: 12px; --gh: 200px; } /* 單格寬 12px，確保 39 根柱子能橫向排開 */
        * { box-sizing: border-box; font-family: "Courier New", monospace; margin: 0; padding: 0; }
        body { background: #fff; padding: 10px; overflow-x: auto; }

        /* 總表容器 */
        .matrix-table { display: flex; flex-direction: column; width: fit-content; border: 2px solid #000; }

        /* 每一列 (5列) */
        .row-group { display: flex; border-bottom: 2px solid #000; background: #fff; }
        .row-group:last-child { border-bottom: none; }

        /* 每個圖的框架 (20個框) */
        .chart-box { 
            width: calc(var(--u) * 39 + 30px); 
            border-right: 1px solid #000; 
            padding: 10px; 
            display: flex; 
            flex-direction: column;
            align-items: center;
        }
        .chart-box:last-child { border-right: none; }

        /* 標頭文字 */
        .title-bar { 
            width: 100%; text-align: center; font-weight: bold; font-size: 13px; 
            margin-bottom: 10px; padding: 3px; background: #eee; border: 1px solid #000;
        }
        .ball-main { background: #000; color: #fff; } /* 左側第一欄特殊色 */

        /* 柱狀圖核心 (185px) */
        .chart-main { 
            display: flex; height: var(--gh); align-items: flex-end; 
            border-bottom: 2px solid #000; border-left: 1px solid #000; 
            position: relative; width: calc(var(--u) * 39);
        }

        /* 180px 紅色虛線 */
        .limit-180 { 
            position: absolute; bottom: 180px; left: 0; width: 100%; 
            border-top: 2px dashed red; z-index: 10; opacity: 0.6;
        }

        /* 柱子元件 */
        .col { width: var(--u); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; position: relative; }
        .bar { width: 7px; background: #7030a0; z-index: 5; } /* 紫柱 */
        .bar.hot { background: #f00; } /* 前三名紅柱 */

        /* 底部 [01-39] 標籤 */
        .labels-39 { display: flex; width: calc(var(--u) * 39); margin-top: 5px; }
        .n-tag { width: var(--u); text-align: center; font-size: 8px; font-weight: bold; color: #333; transform: scale(0.8); }

        /* 數據腳註 */
        .footer-info { font-size: 11px; font-weight: bold; margin-top: 5px; color: #f00; }
    </style>
</head>
<body>

<div id="app" class="matrix-table"></div>

<script src="https://88ll88.github.io/888/ddd.js"></script>

<script>
    // 計算拖牌分佈
    function getStats(ball) {
        let c = {};
        for(let i=1; i<=39; i++) c[i.toString().padStart(2,'0')] = 0;
        for (let i = window.ddd.length - 2; i >= 0; i--) {
            if (window.ddd[i+1].slice(1).includes(ball)) {
                window.ddd[i].slice(1).forEach(b => { if(c[b]!==undefined) c[b]++; });
            }
        }
        return c;
    }

    function renderMatrix() {
        if (!window.ddd) return;
        const last5 = window.ddd[0].slice(1);
        const baseMin = 698, recordHigh = 807, chartMaxH = 185;
        const ratio = chartMaxH / (recordHigh - baseMin);

        let html = "";
        last5.forEach((ball, rIdx) => {
            const stats = getStats(ball);
            const sorted = Object.entries(stats).sort((a,b)=>b[1]-a[1]);
            const top3 = sorted.slice(0, 3); // [[num, count], ...]

            html += `<div class="row-group">`;
            
            // 每一列產生 4 個 [01-39] 柱狀圖
            for(let cIdx=0; cIdx<4; cIdx++) {
                let isMain = (cIdx === 0);
                let title = isMain ? `當期球 ${ball} 全盤拖牌` : `強拖第 ${cIdx} 名：${top3[cIdx-1][0]}`;
                let targetNum = isMain ? "" : top3[cIdx-1][0];
                let targetCount = isMain ? "" : top3[cIdx-1][1] + " 次";

                html += `
                <div class="chart-box">
                    <div class="title-bar ${isMain?'ball-main':''}">${title}</div>
                    <div class="chart-main">
                        <div class="limit-180"></div>`;
                
                Object.keys(stats).forEach(num => {
                    let val = stats[num];
                    let h = (val <= baseMin) ? 0 : (val - baseMin) * ratio;
                    // 顏色邏輯：第一張標前三紅，後三張只標對應的那一根紅
                    let isHot = isMain ? top3.map(x=>x[0]).includes(num) : num === targetNum;
                    
                    html += `
                        <div class="col">
                            <div class="bar ${isHot?'hot':''}" style="height:${h}px"></div>
                        </div>`;
                });

                html += `</div>
                    <div class="labels-39">`;
                for(let n=1; n<=39; n++) html += `<div class="n-tag">${String(n).padStart(2,'0')}</div>`;
                html += `</div>
                    <div class="footer-info">${targetCount}</div>
                </div>`;
            }
            html += `</div>`;
        });
        document.getElementById('app').innerHTML = html;
    }
    window.onload = renderMatrix;
</script>
</body>
</html>
