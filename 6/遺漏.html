<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>漏漏</title>
<style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Consolas", "微軟正黑體"; }
        body { background: #000; width: 1202px; margin: 0 auto; padding-top: 5px; overflow-x: hidden; }
        .nav-bar { width: 1202px; display: flex; gap: 1px; margin-bottom: 2px; }
        .nav-tab { flex: 1; padding: 10px 0; background: #333; color: #ccc; font-size: 12px; text-align: center; text-decoration: none; border: 1px solid #444; font-weight: bold; }
        .nav-tab.active { background: #ff9900 !important; color: #000 !important; }
        .viewport { width: 1202px; background: #fff; border: 1px solid #fff; min-height: 442px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #eee; padding: 10px; border: 1px solid #ccc; }
        td { padding: 8px; border: 1px solid #ccc; text-align: center; font-weight: bold; }
    </style>
    <script src="https://88ll88.github.io/888/aaa.js"></script>
</head>
<body>
    <div class="nav-bar">
        <a href="分佈圖.html" class="nav-tab">分佈圖</a>
        <a href="柱狀圖.html" class="nav-tab">柱狀圖</a>
        <a href="三分區.html" class="nav-tab">三分區</a>
        <a href="拖牌.html" class="nav-tab">拖牌</a>
        <a href="遺漏.html" class="nav-tab active">遺漏</a>
        <a href="統計表.html" class="nav-tab">統計表</a>
    </div>
    <div class="viewport">
        <table>
            <thead><tr><th>號碼</th><th>遺漏期數</th><th>狀態</th></tr></thead>
            <tbody id="tb"></tbody>
        </table>
    </div>
    <script>
        window.onload = function(){
            let h = '';
            for(let i=1;i<=39;i++){
                let b = i<10?'0'+i:''+i, m = 0;
                for(let r=0;r<aaa.length;r++){ if(aaa[r][1].includes(b)) break; m++; }
                h += `<tr><td>${b}</td><td style="color:red;font-size:18px">${m}</td><td>${m>15?'冷':'熱'}</td></tr>`;
            }
            document.getElementById('tb').innerHTML = h;
        }
    </script>
</body>
</html>
