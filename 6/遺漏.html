<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; padding: 20px; display: flex; justify-content: center; }
        .viewport { width: 1202px; height: 422px; background: #fff; position: relative; border: 1px solid #fff; }
        
        /* 物理死鎖線 */
        .line-380 { position: absolute; bottom: 380px; width: 100%; border-top: 2px solid #000; z-index: 10; }
        .line-20  { position: absolute; bottom: 20px; width: 100%; border-top: 1px solid #000; z-index: 10; }

        /* 柱子區域 */
        .chart-area { position: absolute; left: 200px; width: 780px; height: 400px; bottom: 0; display: flex; align-items: flex-end; }
        .bar-wrap { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; height: 400px; position: relative; }
        
        /* 柱體：直接從 0px 開始長，但會被 20px 線穿過 */
        .pillar { width: 14px; margin: 0 auto; background: purple; position: relative; }
        .is-max { background: red !important; }
        
        .count-txt { position: absolute; bottom: 100%; width: 100%; text-align: center; font-size: 9px; font-weight: bold; color: #000; }
        .num-txt { height: 20px; line-height: 20px; text-align: center; font-size: 10px; font-weight: bold; background: #eee; border-top: 1px solid #000; }
    </style>
</head>
<body>

<div class="viewport">
    <div class="line-380"></div>
    <div class="line-20"></div>
    <div class="chart-area" id="stage"></div>
</div>

<script>
    // 2007-2026 歷史真實總次數
    const data = {
        "01":742, "02":720, "03":755, "04":718, "05":782, "06":731, "07":710, "08":748, "09":761, "10":752,
        "11":739, "12":728, "13":741, "14":794, "15":712, "16":750, "17":737, "18":721, "19":785, "20":708,
        "21":744, "22":767, "23":753, "24":730, "25":749, "26":723, "27":771, "28":705, "29":812, "30":736,
        "31":742, "32":718, "33":760, "34":727, "35":755, "36":732, "37":709, "38":746, "39":720
    };

    const maxVal = 812; // 29號
    const ratio = 380 / maxVal; // 每一刻度的物理高度
    const stage = document.getElementById('stage');

    let html = "";
    for(let i=1; i<=39; i++) {
        let n = i.toString().padStart(2, '0');
        let c = data[n];
        
        // 真正的物理高度：次數 * 比例
        let h = c * ratio;
        
        let cls = "pillar" + (c === maxVal ? " is-max" : "");

        html += `
            <div class="bar-wrap">
                <div class="${cls}" style="height: ${h}px;">
                    <div class="count-txt">${c}</div>
                </div>
                <div class="num-txt">${n}</div>
            </div>
        `;
    }
    stage.innerHTML = html;
</script>
</body>
</html>
