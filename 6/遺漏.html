<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>539 遺漏分析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Consolas", "微軟正黑體"; }
        body { background: #f4f4f4; width: 1200px; margin: 0 auto; padding-top: 5px; }
        
        /* 經典 nav-bar 結構 */
        .nav-bar { 
            width: 1200px; height: 32px; background: #000; 
            display: flex; border: 1px solid #fff; margin-bottom: 5px; 
        }
        .nav-bar a { 
            flex: 1; height: 30px; display: flex; align-items: center; justify-content: center; 
            color: #fff; text-decoration: none; font-size: 14px; font-weight: bold; 
            border-right: 1px solid #fff;
        }
        .nav-bar a:hover { background: #333; color: #ff0; }
        .nav-bar a.active { background: #fff; color: #000; }
        .nav-bar a:last-child { border-right: none; }

        /* 視口與表格寬度 */
        .viewport { width: 1200px; border: 1px solid #000; background: #fff; }
        
        /* 表頭 row-black */
        .row-black { background: #000; color: #fff; font-size: 12px; font-weight: bold; height: 20px; display: flex; }
        .black-cell { border: 1px solid #fff; height: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        
        /* 尺寸定義 */
        .w-100 { width: 100px; flex-shrink: 0; }
        .w-780 { width: 780px; flex-shrink: 0; display: flex; }
        .w-20 { width: 20px; flex-shrink: 0; }
        .w-200 { width: 200px; flex-shrink: 0; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .pointer { cursor: pointer; user-select: none; }

        /* 內容滾動區 */
        .scroll-area { height: 400px; overflow-y: scroll; border-bottom: 2px solid #000; }
        .row-data { display: flex; height: 20px; border-bottom: 1px solid #ddd; font-size: 11px; }
        .cell { width: 20px; height: 20px; border: 1px solid #fff; background: #eee; flex-shrink: 0; }
        
        /* 遺漏計算邏輯色塊 */
        .active-omit { background: #bbb !important; color: #333; font-weight: bold; }
        .ended-omit { color: #999; }
        .ball-hit { font-weight: bold; font-size: 16px; line-height: 18px; text-align: center; }
        
        /* 統計與歷史 */
        .row-period { background: #fdf2d0; height: 20px; display: flex; font-size: 11px; font-weight: bold; border-bottom: 1px solid #999; cursor: pointer; }
        .row-history { background: #e0e0e0; height: 20px; display: flex; font-size: 9px; font-weight: bold; border-bottom: 1px solid #000; }
        .label-zone { width: 200px; border-right: 1px solid #999; text-align: center; line-height: 20px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="分佈圖.html" class="nav-tab">分佈圖</a>
        <a href="柱狀圖.html" class="nav-tab">柱狀圖</a>
        <a href="三分區.html" class="nav-tab">三分區</a>
        <a href="拖牌.html" class="nav-tab">拖牌</a>
        <a href="遺漏.html" class="nav-tab active">遺漏</a>
        <a href="統計表.html" class="nav-tab">統計表</a>    
    </div>

<div class="viewport">
    <div class="row-black">
        <div class="w-100 black-cell pointer" onclick="toggleDate()">日期</div>
        <div id="sort-label" class="w-100 black-cell pointer" onclick="toggleSort()">號碼</div>
        <div id="h-nums" class="w-780 flex-center"></div>
        <div class="w-20 black-cell">#</div>
        <div class="w-200 black-cell"></div>
    </div>

    <div id="main-content" class="scroll-area"></div>

    <div class="row-period" onclick="cycleP()">
        <div class="label-zone" id="p-title">近期統計 (30期) ▽</div>
        <div id="p-cells" class="w-780 flex-center"></div>
        <div class="w-220"></div>
    </div>

    <div class="row-history">
        <div class="label-zone">最近最大遺漏</div>
        <div id="current-miss" class="w-780 flex-center"></div>
        <div class="w-220"></div>
    </div>

    <div class="row-history" style="background: #d0d0d0;">
        <div class="label-zone">歷史最大遺漏</div>
        <div id="history-max" class="w-780 flex-center"></div>
        <div class="w-220"></div>
    </div>

    <div style="width:1200px; height:2px; background:#000;"></div>

    <div class="row-black">
        <div class="w-200 black-cell" style="justify-content: flex-end; padding-right: 10px;">號碼</div>
        <div id="f-nums" class="w-780 flex-center"></div>
        <div class="w-220 black-cell"></div>
    </div>
</div>

<script src="aaa.js"></script>
<script>
    let pIdx = 0, dateMode = 0, sortMode = 0;
    const steps = [30, 50, 100, 200, 500];
    const sortNames = ["號碼", "遞增", "落球序"];
    const hitColors = ["#8b0000", "#ff0000", "#00008b"]; 

    function cycleP() { pIdx = (pIdx + 1) % steps.length; render(); }
    function toggleDate() { dateMode = 1 - dateMode; render(); }
    function toggleSort() { sortMode = (sortMode + 1) % 3; render(); }

    function render() {
        if (!window.aaa) return;
        const curLimit = steps[pIdx];
        document.getElementById('p-title').innerText = `近期統計 (${curLimit}期) ▽`;
        document.getElementById('sort-label').innerText = sortNames[sortMode];
        const curHitColor = hitColors[sortMode]; 

        let hMax = Array(40).fill(0), curCount = Array(40).fill(0), pCounts = Array(40).fill(0);
        [...aaa].reverse().forEach(row => {
            let wins = row[1].map(n => parseInt(n));
            for(let n=1; n<=39; n++) {
                if(wins.includes(n)) curCount[n] = 0;
                else {
                    curCount[n]++;
                    if(curCount[n] > hMax[n]) hMax[n] = curCount[n];
                }
            }
        });

        let html = '', stopFlags = Array(40).fill(false);
        aaa.slice(0, curLimit).forEach((row, i) => {
            let wins = row[1].map(n => parseInt(n));
            wins.forEach(n => pCounts[n]++);
            let dVal = (dateMode === 0) ? row[0] : row[2];
            let showNums = (sortMode === 0) ? [...wins] : (sortMode === 1 ? [...wins].sort((a,b)=>a-b) : [...row[3]]);
            
            let cells = '';
            for(let n=1; n<=39; n++) {
                let val = 0;
                for(let k=i; k<aaa.length; k++) {
                    if(aaa[k][1].includes(n.toString().padStart(2,'0'))) break;
                    val++;
                }
                if(val === 0) {
                    cells += `<div class="cell ball-hit" style="color:${curHitColor}">●</div>`;
                    stopFlags[n] = true; 
                } else {
                    cells += `<div class="cell flex-center ${!stopFlags[n] ? 'active-omit' : 'ended-omit'}">${val}</div>`;
                }
            }

            html += `<div class="row-data">
                <div class="w-100 flex-center pointer" onclick="toggleDate()">${dVal}</div>
                <div class="w-100 flex-center pointer" style="font-weight:bold; border-right:1px solid #000;" onclick="toggleSort()">${showNums.join(',')}</div>
                <div class="w-780 flex-center">${cells}</div>
                <div class="w-20 flex-center" style="background:#eee; font-weight:bold; border-right:1px solid #fff;">${i + 1}</div>
                <div class="w-200"></div>
            </div>`;
        });

        document.getElementById('main-content').innerHTML = html;
        document.getElementById('p-cells').innerHTML = pCounts.slice(1).map(c => `<div class="cell flex-center">${c}</div>`).join('');
        document.getElementById('current-miss').innerHTML = Array.from({length:39},(_,idx)=>{
            let n = idx+1;
            let c = 0;
            for(let k=0; k<aaa.length; k++) {
                if(aaa[k][1].includes(n.toString().padStart(2,'0'))) break;
                c++;
            }
            return `<div class="cell flex-center">${c}</div>`;
        }).join('');
        document.getElementById('history-max').innerHTML = hMax.slice(1).map(v => `<div class="cell flex-center" style="color:#c00;">${v}</div>`).join('');
    }

    window.onload = () => {
        const ns = Array.from({length:39},(_,i)=> `<div class="num-black flex-center">${(i+1).toString().padStart(2,'0')}</div>`).join('');
        document.getElementById('h-nums').innerHTML = ns;
        document.getElementById('f-nums').innerHTML = ns;
        render();
    };
</script>
</body>
</html>
