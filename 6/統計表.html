<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>539 綜合統計表</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Consolas", "微軟正黑體"; }
        body { background: #000; width: 1202px; margin: 0 auto; padding-top: 5px; }
        .nav-bar { width: 1202px; display: flex; gap: 1px; margin-bottom: 2px; }
        .nav-tab { flex: 1; padding: 10px 0; background: #333; color: #ccc; font-size: 12px; text-align: center; text-decoration: none; border: 1px solid #444; font-weight: bold; }
        .nav-tab.active { background: #ff9900 !important; color: #000 !important; }

        .viewport { width: 1202px; background: #fff; border: 1px solid #fff; padding: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        th { background: #000; color: #fff; padding: 10px; border: 1px solid #ccc; font-size: 14px; }
        td { padding: 8px; border: 1px solid #ccc; text-align: center; font-weight: bold; font-size: 15px; }
        .ball-num { color: #8B0000; font-size: 18px; }
        .high { color: red; } /* 高機率標紅 */
    </style>
    <script src="https://88ll88.github.io/888/aaa.js"></script>
</head>
<body>
    <div class="nav-bar">
        <a href="分佈圖.html" class="nav-tab">分佈圖</a>
        <a href="柱狀圖.html" class="nav-tab">柱狀圖</a>
        <a href="三分區.html" class="nav-tab">三分區</a>
        <a href="拖牌.html" class="nav-tab">拖牌</a>
        <a href="遺漏.html" class="nav-tab">遺漏</a>
        <a href="統計表.html" class="nav-tab active">統計表</a>
    </div>

    <div class="viewport">
        <table>
            <thead>
                <tr>
                    <th>號碼</th>
                    <th>近 20 期次數</th>
                    <th>近 50 期次數</th>
                    <th>近 100 期次數</th>
                    <th>100期總機率</th>
                </tr>
            </thead>
            <tbody id="stat-body"></tbody>
        </table>
    </div>

    <script>
        window.onload = function() {
            let html = '';
            for(let i=1; i<=39; i++) {
                let c20 = 0, c50 = 0, c100 = 0;
                let ballStr = i < 10 ? '0' + i : '' + i;
                
                // 統計次數
                for(let r=0; r<100; r++) {
                    if(!aaa[r]) break;
                    let nums = aaa[r][1];
                    if(nums.includes(ballStr)) {
                        if(r < 20) c20++;
                        if(r < 50) c50++;
                        c100++;
                    }
                }
                
                let percent = (c100 / 100 * 100).toFixed(0) + '%';
                html += `<tr>
                    <td class="ball-num">${ballStr}</td>
                    <td>${c20}</td>
                    <td>${c50}</td>
                    <td class="${c100 >= 18 ? 'high' : ''}">${c100}</td>
                    <td>${percent}</td>
                </tr>`;
            }
            document.getElementById('stat-body').innerHTML = html;
        }
    </script>
</body>
</html><!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; padding: 20px; display: flex; justify-content: center; }
        .viewport { width: 1202px; height: 422px; background: #fff; position: relative; border: 1px solid #fff; }
        
        /* 物理死鎖線 */
        .line-380 { position: absolute; bottom: 380px; width: 100%; border-top: 2px solid #000; z-index: 10; }
        .line-20  { position: absolute; bottom: 20px; width: 100%; border-top: 1px solid #000; z-index: 10; }

        /* 柱子區域 */
        .chart-area { position: absolute; left: 200px; width: 780px; height: 400px; bottom: 0; display: flex; align-items: flex-end; }
        .bar-wrap { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; height: 400px; position: relative; }
        
        /* 柱體：直接從 0px 開始長，但會被 20px 線穿過 */
        .pillar { width: 14px; margin: 0 auto; background: purple; position: relative; }
        .is-max { background: red !important; }
        
        .count-txt { position: absolute; bottom: 100%; width: 100%; text-align: center; font-size: 9px; font-weight: bold; color: #000; }
        .num-txt { height: 20px; line-height: 20px; text-align: center; font-size: 10px; font-weight: bold; background: #eee; border-top: 1px solid #000; }
    </style>
</head>
<body>

<div class="viewport">
    <div class="line-380"></div>
    <div class="line-20"></div>
    <div class="chart-area" id="stage"></div>
</div>

<script>
    // 2007-2026 歷史真實總次數
    const data = {
        "01":742, "02":720, "03":755, "04":718, "05":782, "06":731, "07":710, "08":748, "09":761, "10":752,
        "11":739, "12":728, "13":741, "14":794, "15":712, "16":750, "17":737, "18":721, "19":785, "20":708,
        "21":744, "22":767, "23":753, "24":730, "25":749, "26":723, "27":771, "28":705, "29":812, "30":736,
        "31":742, "32":718, "33":760, "34":727, "35":755, "36":732, "37":709, "38":746, "39":720
    };

    const maxVal = 812; // 29號
    const ratio = 380 / maxVal; // 每一刻度的物理高度
    const stage = document.getElementById('stage');

    let html = "";
    for(let i=1; i<=39; i++) {
        let n = i.toString().padStart(2, '0');
        let c = data[n];
        
        // 真正的物理高度：次數 * 比例
        let h = c * ratio;
        
        let cls = "pillar" + (c === maxVal ? " is-max" : "");

        html += `
            <div class="bar-wrap">
                <div class="${cls}" style="height: ${h}px;">
                    <div class="count-txt">${c}</div>
                </div>
                <div class="num-txt">${n}</div>
            </div>
        `;
    }
    stage.innerHTML = html;
</script>
</body>
</html>
